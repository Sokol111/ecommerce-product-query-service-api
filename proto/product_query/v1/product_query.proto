syntax = "proto3";

package product_query.v1;

option go_package = "github.com/Sokol111/ecommerce-product-query-service-api/gen/connect/product_query/v1;productqueryv1";

import "google/protobuf/timestamp.proto";

// ==================== ENUMS ====================

enum AttributeType {
  ATTRIBUTE_TYPE_UNSPECIFIED = 0;
  ATTRIBUTE_TYPE_SINGLE = 1;
  ATTRIBUTE_TYPE_MULTIPLE = 2;
  ATTRIBUTE_TYPE_RANGE = 3;
  ATTRIBUTE_TYPE_BOOLEAN = 4;
  ATTRIBUTE_TYPE_TEXT = 5;
}

enum AttributeRole {
  ATTRIBUTE_ROLE_UNSPECIFIED = 0;
  ATTRIBUTE_ROLE_VARIANT = 1;
  ATTRIBUTE_ROLE_SPECIFICATION = 2;
}

// ==================== ENTITIES ====================

message AttributeValueItem {
  optional string slug = 1;
  string value = 2;
  optional string color_code = 3;
}

message AttributeValue {
  string attribute_id = 1;
  string slug = 2;
  string name = 3;
  AttributeType type = 4;
  optional string unit = 5;
  AttributeRole role = 6;
  int32 sort_order = 7;
  repeated AttributeValueItem values = 8;
}

message Product {
  string id = 1;
  string name = 2;
  optional string description = 3;
  double price = 4;
  int32 quantity = 5;
  optional string image_id = 6;
  optional string small_image_url = 7;
  optional string large_image_url = 8;
  optional string category_id = 9;
  repeated AttributeValue attributes = 10;
}

// ==================== FACETS ====================

message FacetValue {
  string value = 1;
  int32 count = 2;
}

message AttributeFacet {
  string slug = 1;
  repeated FacetValue values = 2;
}

message PriceRange {
  double min = 1;
  double max = 2;
}

// ==================== REQUESTS ====================

message GetProductByIdRequest {
  string id = 1;
}

message GetRandomProductsRequest {
  int32 count = 1;
}

message AttributeFilter {
  string slug = 1;
  repeated string values = 2;
  optional double min = 3;
  optional double max = 4;
}

message GetProductListRequest {
  int32 page = 1;
  int32 size = 2;
  optional string category_id = 3;
  optional string sort = 4;
  optional string order = 5;
  optional double min_price = 6;
  optional double max_price = 7;
  repeated AttributeFilter attribute_filters = 8;
}

message GetProductFacetsRequest {
  string category_id = 1;
}

// ==================== RESPONSES ====================

message GetProductByIdResponse {
  Product product = 1;
}

message GetRandomProductsResponse {
  repeated Product items = 1;
}

message GetProductListResponse {
  repeated Product items = 1;
  int32 page = 2;
  int32 size = 3;
  int32 total = 4;
}

message GetProductFacetsResponse {
  repeated AttributeFacet facets = 1;
  PriceRange price_range = 2;
}

// ==================== SERVICE ====================

service ProductQueryService {
  rpc GetProductById(GetProductByIdRequest) returns (GetProductByIdResponse);
  rpc GetRandomProducts(GetRandomProductsRequest) returns (GetRandomProductsResponse);
  rpc GetProductList(GetProductListRequest) returns (GetProductListResponse);
  rpc GetProductFacets(GetProductFacetsRequest) returns (GetProductFacetsResponse);
}
