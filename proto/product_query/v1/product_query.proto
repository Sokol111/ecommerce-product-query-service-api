syntax = "proto3";

package product_query.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/Sokol111/ecommerce-product-query-service-api/gen/go/product_query/v1;productqueryv1";

// ==================== ENUMS ====================

enum AttributeType {
  ATTRIBUTE_TYPE_UNSPECIFIED = 0;
  ATTRIBUTE_TYPE_SINGLE = 1;
  ATTRIBUTE_TYPE_MULTIPLE = 2;
  ATTRIBUTE_TYPE_RANGE = 3;
  ATTRIBUTE_TYPE_BOOLEAN = 4;
  ATTRIBUTE_TYPE_TEXT = 5;
}

enum AttributeRole {
  ATTRIBUTE_ROLE_UNSPECIFIED = 0;
  ATTRIBUTE_ROLE_VARIANT = 1;
  ATTRIBUTE_ROLE_SPECIFICATION = 2;
}

// ==================== ENTITIES ====================

message AttributeValueItem {
  optional string slug = 1;
  string value = 2;
  optional string color_code = 3;
}

message AttributeValue {
  string attribute_id = 1;
  string slug = 2;
  string name = 3;
  AttributeType type = 4;
  optional string unit = 5;
  AttributeRole role = 6;
  int32 sort_order = 7;
  repeated AttributeValueItem values = 8;
}

message Product {
  string id = 1;
  string name = 2;
  optional string description = 3;
  double price = 4;
  int32 quantity = 5;
  optional string image_id = 6;
  optional string small_image_url = 7;
  optional string large_image_url = 8;
  optional string category_id = 9;
  repeated AttributeValue attributes = 10;
}

// ==================== FACETS ====================

message FacetValue {
  string value = 1;
  int32 count = 2;
}

message AttributeFacet {
  string slug = 1;
  repeated FacetValue values = 2;
}

message PriceRange {
  double min = 1;
  double max = 2;
}

// ==================== REQUESTS ====================

message GetProductByIdRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetRandomProductsRequest {
  int32 count = 1 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];
}

message AttributeFilter {
  string slug = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
    pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
  }];
  repeated string values = 2 [(buf.validate.field).repeated.items.string = {
    min_len: 1
    max_len: 255
  }];
  optional double min = 3;
  optional double max = 4;
}

message GetProductListRequest {
  option (buf.validate.message).cel = {
    id: "price_range"
    message: "min_price must be less than or equal to max_price"
    expression: "!has(this.min_price) || !has(this.max_price) || this.min_price <= this.max_price"
  };

  int32 page = 1 [(buf.validate.field).int32.gte = 1];
  int32 size = 2 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];
  optional string category_id = 3 [(buf.validate.field).string.uuid = true];
  optional string sort = 4 [(buf.validate.field).string = {
    in: ["name", "price", "quantity"]
  }];
  optional string order = 5 [(buf.validate.field).string = {
    in: ["asc", "desc"]
  }];
  optional double min_price = 6 [(buf.validate.field).double.gte = 0];
  optional double max_price = 7 [(buf.validate.field).double.gte = 0];
  repeated AttributeFilter attribute_filters = 8;
}

message GetProductFacetsRequest {
  string category_id = 1 [(buf.validate.field).string.uuid = true];
}

// ==================== RESPONSES ====================

message GetProductByIdResponse {
  Product product = 1;
}

message GetRandomProductsResponse {
  repeated Product items = 1;
}

message GetProductListResponse {
  repeated Product items = 1;
  int32 page = 2;
  int32 size = 3;
  int64 total = 4;
}

message GetProductFacetsResponse {
  repeated AttributeFacet facets = 1;
  PriceRange price_range = 2;
}

// ==================== SERVICE ====================

service ProductQueryService {
  rpc GetProductById(GetProductByIdRequest) returns (GetProductByIdResponse);
  rpc GetRandomProducts(GetRandomProductsRequest) returns (GetRandomProductsResponse);
  rpc GetProductList(GetProductListRequest) returns (GetProductListResponse);
  rpc GetProductFacets(GetProductFacetsRequest) returns (GetProductFacetsResponse);
}
